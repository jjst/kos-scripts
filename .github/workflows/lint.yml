name: Lint

on:
  push:
    paths:
      - "**/*.ks"
      - ksconfig.json
      - package.json
      - package-lock.json
      - scripts/ks-lint.js
  pull_request:
    paths:
      - "**/*.ks"
      - ksconfig.json
      - package.json
      - package-lock.json
      - scripts/ks-lint.js

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint -- --strict
